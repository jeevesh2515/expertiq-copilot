name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET_KEY: "test_secret_key_for_ci_only_not_production"
          CHROMA_PERSIST_DIR: "./test_chroma_db"
          APP_ENV: "testing"
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Run bandit (security linter)
        run: |
          pip install bandit
          cd backend
          bandit -r app/ -ll -ii --skip B101 || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t expertiq-backend ./backend

      - name: Build frontend image
        run: docker build -t expertiq-frontend ./frontend

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true
