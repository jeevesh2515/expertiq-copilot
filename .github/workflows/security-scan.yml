name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

jobs:
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install bandit safety

      - name: Bandit — Python security linter
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json -ll -ii --skip B101 || true
          bandit -r app/ -ll -ii --skip B101 || true

      - name: Safety — Dependency vulnerability check
        run: |
          cd backend
          pip install safety
          safety check --output json > safety-report.json 2>&1 || true
          safety check || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            backend/bandit-report.json
            backend/safety-report.json
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          cd backend
          echo "Security scan completed. Review reports for details."
